name: Growth Pulse ⚡

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  growth-pulse:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 10x Download Multiplier (Bot)
        working-directory: ./timefi-growth-bot
        run: |
          for i in {1..10}; do
            echo "Download Pulse $i/10..."
            npm install timefi-sdk --prefer-online --no-package-lock
          done

      - name: Run Bot
        working-directory: ./timefi-growth-bot
        run: node index.js

      - name: 10x Download Multiplier (Starter App)
        working-directory: ./timefi-starter-app
        run: |
          for i in {1..10}; do
            npm install timefi-sdk --prefer-online --no-package-lock
          done
